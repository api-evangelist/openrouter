naftiko: 1.0.0-alpha2
info:
  label: OpenRouter API — Completions
  description: 'OpenRouter API — Completions. 1 operations. Lead operation: Create completion. Self-contained Naftiko capability
    covering one Openrouter business surface.'
  tags:
  - Openrouter
  - Completions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENROUTER_API_KEY: OPENROUTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: openrouter-completions
    baseUri: https://openrouter.ai/api/v1
    description: OpenRouter API — Completions business capability. Self-contained, no shared references.
    resources:
    - name: completions
      path: /completions
      operations:
      - name: createcompletion
        method: POST
        description: Create completion
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.OPENROUTER_API_KEY}}'
  exposes:
  - type: rest
    namespace: openrouter-completions-rest
    port: 8080
    description: REST adapter for OpenRouter API — Completions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/completions
      name: completions
      description: REST surface for completions.
      operations:
      - method: POST
        name: createcompletion
        description: Create completion
        call: openrouter-completions.createcompletion
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openrouter-completions-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenRouter API — Completions. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-completion
      description: Create completion
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openrouter-completions.createcompletion
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
