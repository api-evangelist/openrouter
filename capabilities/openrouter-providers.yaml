naftiko: 1.0.0-alpha2
info:
  label: OpenRouter API — Providers
  description: 'OpenRouter API — Providers. 1 operations. Lead operation: List providers. Self-contained Naftiko capability
    covering one Openrouter business surface.'
  tags:
  - Openrouter
  - Providers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    OPENROUTER_API_KEY: OPENROUTER_API_KEY
capability:
  consumes:
  - type: http
    namespace: openrouter-providers
    baseUri: https://openrouter.ai/api/v1
    description: OpenRouter API — Providers business capability. Self-contained, no shared references.
    resources:
    - name: providers
      path: /providers
      operations:
      - name: listproviders
        method: GET
        description: List providers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.OPENROUTER_API_KEY}}'
  exposes:
  - type: rest
    namespace: openrouter-providers-rest
    port: 8080
    description: REST adapter for OpenRouter API — Providers. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/providers
      name: providers
      description: REST surface for providers.
      operations:
      - method: GET
        name: listproviders
        description: List providers
        call: openrouter-providers.listproviders
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openrouter-providers-mcp
    port: 9090
    transport: http
    description: MCP adapter for OpenRouter API — Providers. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-providers
      description: List providers
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openrouter-providers.listproviders
      outputParameters:
      - type: object
        mapping: $.
